[phases.setup]
nixPkgs = [
  "php82",
  "php82Packages.composer",
  "php82Extensions.gd",
  "php82Extensions.mbstring",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.fileinfo",
  "freetype",
  "libpng",
  "nodejs"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-gd",
  "npm install",
  "npm run build",
  "cp .env.example .env",
  "php artisan key:generate --force",
  "php artisan config:clear",
  "php artisan config:cache",
  "php artisan route:clear",
  "php artisan route:cache",
  "php artisan view:clear",
  "php artisan storage:link"
]

[start]
cmd = "sh -c 'php artisan migrate --force || true && php artisan db:seed --force || true && php artisan serve --host=0.0.0.0 --port=$PORT'"
